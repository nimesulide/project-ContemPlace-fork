name = "contemplace-gardener"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
GARDENER_SIMILARITY_THRESHOLD = "0.70"

[triggers]
# 2am UTC = 3–4am CET/CEST. Chosen as a low-traffic window for a European-timezone user.
# This time is arbitrary — change it freely. The gardener is idempotent and safe to run at any hour.
# To trigger a run immediately without waiting for the cron (e.g. after a bulk import),
# use the /trigger HTTP endpoint once issue #32 is implemented, or run locally via:
#   npx wrangler dev -c gardener/wrangler.toml --test-scheduled
#   curl "http://localhost:8787/__scheduled?cron=0+2+*+*+*"
crons = ["0 2 * * *"]

# Secrets (set via: wrangler secret put <NAME> -c gardener/wrangler.toml):
# SUPABASE_URL
# SUPABASE_SERVICE_ROLE_KEY
# TELEGRAM_BOT_TOKEN         (optional — enables failure alerts to Telegram)
# TELEGRAM_ALERT_CHAT_ID     (optional — chat ID to receive failure alerts)
# GARDENER_API_KEY           (optional — enables POST /trigger endpoint for manual runs)
