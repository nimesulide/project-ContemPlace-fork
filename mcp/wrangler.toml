name = "mcp-contemplace"
main = "src/index.ts"
compatibility_date = "2024-04-03"
compatibility_flags = ["nodejs_compat"]

[vars]
CAPTURE_MODEL = "anthropic/claude-haiku-4-5"
EMBED_MODEL = "openai/text-embedding-3-small"
MATCH_THRESHOLD = "0.35"
RECENT_FRAGMENTS_COUNT = "5"
RECENT_FRAGMENTS_WINDOW_MINUTES = "60"

[[kv_namespaces]]
binding = "OAUTH_KV"
id = "YOUR_KV_NAMESPACE_ID"        # create with: wrangler kv namespace create OAUTH_KV -c mcp/wrangler.toml
preview_id = "YOUR_KV_PREVIEW_ID"  # create with: wrangler kv namespace create OAUTH_KV --preview -c mcp/wrangler.toml

# Secrets (set via: wrangler secret put <NAME> -c mcp/wrangler.toml):
# MCP_API_KEY
# CONSENT_SECRET          — protects the OAuth consent page; generate with: openssl rand -hex 16
# SUPABASE_URL
# SUPABASE_SERVICE_ROLE_KEY
# OPENROUTER_API_KEY
