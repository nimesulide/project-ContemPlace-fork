name = "contemplace-dashboard-api"
main = "src/index.ts"
compatibility_date = "2024-04-03"
compatibility_flags = ["nodejs_compat"]

[vars]
CORS_ORIGIN = "https://contemplace-dashboard.pages.dev"
BACKUP_REPO = "freegyes/contemplace-backups"
MCP_ENDPOINT = "https://mcp.contemplace.app/"
TELEGRAM_BOT_USERNAME = "ContemPlaceBot"

# Secrets (set via: wrangler secret put <NAME> -c dashboard-api/wrangler.toml):
# SUPABASE_URL
# SUPABASE_SERVICE_ROLE_KEY
# SUPABASE_JWT_SECRET
# DASHBOARD_API_KEY
# GITHUB_BACKUP_PAT        (optional — enables backup freshness metric)

[[services]]
binding = "CAPTURE_SERVICE"
service = "mcp-contemplace"
entrypoint = "CaptureService"
